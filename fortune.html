<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#bfe0f4">
<title>공차 행운빨대</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body{ height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; }
  body{ background:#bfe0f4; }

  /* ===== 무대 ===== */
  #stage{ position:fixed; inset:0; overflow:hidden;
    background:url('assets/gongcha/bg.jpg') center/cover no-repeat, linear-gradient(180deg,#e4f2fb 0%,#bfe0f4 60%,#a8d3ef 100%); }

  /* 반짝이(코드 추가분) */
  .spark{ position:absolute; color:#fff; opacity:.9; pointer-events:none;
    text-shadow:0 0 8px rgba(255,255,255,.8); animation:tw 2.6s ease-in-out infinite; }
  @keyframes tw{ 0%,100%{ transform:scale(1); opacity:.55 } 50%{ transform:scale(1.25); opacity:1 } }

  /* ===== 타이틀 ===== */
  #title{ position:absolute; top:max(20px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    width:min(84%,420px); z-index:20; pointer-events:none;
    filter:drop-shadow(0 8px 16px rgba(214,40,120,.25)); transition:opacity .4s, transform .5s; }
  #stage.result #title{ opacity:0; transform:translateX(-50%) translateY(-20px); }

  /* ===== 컵 ===== */
  #cupWrap{ position:absolute; left:50%; bottom:-1vh; transform:translateX(-50%); z-index:14;
    width:min(60vw,240px); transform-origin:50% 92%; }
  #cup{ width:100%; display:block; filter:drop-shadow(0 14px 22px rgba(60,80,120,.28)); }
  #cupWrap.shaking{ animation:wobble .18s linear infinite; }
  @keyframes wobble{
    0%{ transform:translateX(-50%) rotate(-2.2deg) }
    25%{ transform:translateX(-50%) rotate(1.8deg) translateY(-2px) }
    50%{ transform:translateX(-50%) rotate(-1.4deg) }
    75%{ transform:translateX(-50%) rotate(2.2deg) translateY(-2px) }
    100%{ transform:translateX(-50%) rotate(-2.2deg) }
  }

  /* ===== 빨대 ===== */
  #strawPos{ position:absolute; left:50%; bottom:15vh; z-index:12;
    transform:translateX(-50%) translateY(var(--raise,150px));
    transition:transform 1s cubic-bezier(.16,1.02,.3,1); }
  #strawJit{ position:relative; }
  #stage.shaking #strawJit{ animation:sjit .16s linear infinite; }
  @keyframes sjit{ 0%{transform:translateX(-1px) rotate(-1.2deg)} 50%{transform:translateX(1px) rotate(1.2deg)} 100%{transform:translateX(-1px) rotate(-1.2deg)} }

  #straw{ position:relative; width:26px; height:38vh; max-height:320px; margin:0 auto;
    border-radius:13px 13px 5px 5px; overflow:hidden;
    box-shadow:0 6px 14px rgba(150,10,20,.28); }
  #strawTex{ position:absolute; left:50%; top:50%; height:26px; width:340px;
    transform:translate(-50%,-50%) rotate(90deg); object-fit:cover; }
  #strawText{ position:absolute; inset:0; display:flex; align-items:flex-start; justify-content:center;
    padding-top:14px; writing-mode:vertical-rl; text-orientation:upright;
    color:#fff; font-weight:800; font-size:15px; letter-spacing:2px; line-height:1.05;
    text-shadow:0 1px 3px rgba(120,0,10,.5); opacity:0; transition:opacity .4s .3s; word-break:keep-all; }
  #stage.result #strawText{ opacity:1; }

  /* ===== 카드 공통 ===== */
  .card{ position:absolute; left:50%; transform:translateX(-50%);
    width:min(78%,340px); background:rgba(255,255,255,.94); border-radius:28px;
    box-shadow:0 18px 40px rgba(70,100,140,.28); padding:30px 26px; text-align:center; z-index:18;
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); }

  /* 시작 카드 */
  #startCard{ top:34%; }
  #startCard .lead{ color:#37506a; font-size:21px; font-weight:800; line-height:1.5; word-break:keep-all; }
  .note{ color:#9aa7b5; font-size:11.5px; margin-top:14px; line-height:1.6; }
  .note b{ color:#6b7b8c; }

  /* 결과 카드 */
  #resultCard{ top:7%; display:none; }
  #resultCard .rlabel{ color:#37506a; font-size:22px; font-weight:900; letter-spacing:1px; }
  #resultCard .divider{ height:2px; width:44px; margin:12px auto 16px; border-radius:2px;
    background:linear-gradient(90deg,#ff8fc0,#e5397f); }
  #resultCard .rmsg{ color:#3a4b5c; font-size:18px; font-weight:700; line-height:1.55; word-break:keep-all; min-height:56px; }

  /* 버튼 */
  .btn{ margin-top:20px; padding:15px 0; width:70%; font-size:20px; font-weight:800; color:#fff;
    background:linear-gradient(180deg,#f65aa6,#e5297e); border:none; border-radius:99px; cursor:pointer;
    box-shadow:0 8px 20px rgba(229,41,126,.4); letter-spacing:.5px; }
  .btn:active{ transform:scale(.95); }

  /* 흔들기 안내 + 게이지 */
  #hint{ position:absolute; top:46%; left:50%; transform:translateX(-50%); z-index:16;
    color:#2f4a63; font-size:18px; font-weight:800; text-align:center; word-break:keep-all; width:80%;
    text-shadow:0 1px 4px rgba(255,255,255,.85); opacity:0; transition:opacity .3s; pointer-events:none; }
  #stage.shaking #hint{ opacity:1; }
  #meterWrap{ position:absolute; bottom:8vh; left:50%; transform:translateX(-50%); z-index:16;
    width:min(64%,320px); height:12px; border-radius:99px; overflow:hidden;
    background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.7);
    opacity:0; transition:opacity .3s; }
  #stage.shaking #meterWrap{ opacity:1; }
  #meter{ height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,#ffb0d4,#f65aa6,#e5297e); transition:width .1s linear; }

  #sensor{ position:absolute; top:max(14px,env(safe-area-inset-top)); right:14px; z-index:22;
    font-size:10.5px; font-weight:600; color:#5a7184; padding:4px 9px; border-radius:99px;
    background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.6); opacity:0; transition:.3s; }
  #sensor.show{ opacity:1; }
  #sensor.on{ color:#1f9d57; }
</style>
</head>
<body>
<div id="stage">
  <img id="title" src="assets/gongcha/title.png" alt="공차 행운빨대">
  <div id="sensor">센서 대기</div>
  <div id="hint">📱 휴대폰을 흔드세요!</div>

  <div id="strawPos">
    <div id="strawJit">
      <div id="straw">
        <img id="strawTex" src="assets/gongcha/straw.png" alt="">
        <div id="strawText"></div>
      </div>
    </div>
  </div>

  <div id="cupWrap"><img id="cup" src="assets/gongcha/cup.png" alt="공차 컵"></div>

  <div id="meterWrap"><div id="meter"></div></div>

  <div class="card" id="startCard">
    <div class="lead">휴대폰을 흔들어<br>오늘의 행운빨대를<br>뽑아보세요!</div>
    <button class="btn" id="startBtn">Start</button>
    <div class="note">아이폰은 시작 시 <b>동작·방향 접근</b> 허용 팝업이 떠요. 허용을 눌러주세요.</div>
  </div>

  <div class="card" id="resultCard">
    <div class="rlabel">오늘의 행운</div>
    <div class="divider"></div>
    <div class="rmsg" id="rmsg"></div>
    <button class="btn" id="replayBtn">Replay</button>
  </div>
</div>

<script>
/* ===== 반짝이 배치 ===== */
(function(){
  const st=document.getElementById('stage');
  const pts=[[12,16,16],[80,12,12],[68,30,20],[20,40,12],[88,46,16],[8,62,14],[74,66,22],[30,74,12],[90,80,18],[16,86,16]];
  for(const [x,y,s] of pts){
    const el=document.createElement('div'); el.className='spark'; el.textContent='✦';
    el.style.left=x+'%'; el.style.top=y+'%'; el.style.fontSize=s+'px';
    el.style.animationDelay=(x%10)*0.18+'s';
    st.appendChild(el);
  }
})();

/* ===== 운세 데이터 ===== */
const FORTUNES=[
  {straw:'대박\n예감', msg:'기다리던 좋은 소식이\n오늘 도착할 거예요!'},
  {straw:'행운\n가득', msg:'평소 안 풀리던 일이\n오늘은 술술 풀려요.'},
  {straw:'돈복\n터짐', msg:'생각지 못한 곳에서\n이득이 생길 수 있어요.'},
  {straw:'귀인\n등장', msg:'좋은 인연이나 도움 주는\n사람을 만나는 하루.'},
  {straw:'힐링\n타임', msg:'무리하지 말고 오늘은\n컨디션을 챙기세요.'},
  {straw:'노력\n결실', msg:'준비한 만큼 결과가\n따라오는 하루예요.'},
  {straw:'도전\n행운', msg:'새로운 아이디어가 솟아나!\n주저 말고 도전해봐 🍀'},
  {straw:'설렘\n주의', msg:'소소한 일에서 행복을\n느끼는 즐거운 하루.'},
  {straw:'오해\n해소', msg:'짧은 대화 한마디면\n관계가 부드러워져요.'},
  {straw:'선택\n적기', msg:'망설이던 그 선택,\n지금이 딱 좋은 타이밍!'},
  {straw:'칭찬\n받음', msg:'당신의 노력을 누군가\n알아봐 주는 날이에요.'},
  {straw:'꽃길\n예약', msg:'걱정하던 일이 생각보다\n별일 아니었어요.'},
];

/* ===== 상태 ===== */
const stage=document.getElementById('stage');
const strawPos=document.getElementById('strawPos');
const strawTextEl=document.getElementById('strawText');
const cupWrap=document.getElementById('cupWrap');
const meter=document.getElementById('meter');
const hint=document.getElementById('hint');
const sensorEl=document.getElementById('sensor');
const startCard=document.getElementById('startCard');
const resultCard=document.getElementById('resultCard');
const rmsg=document.getElementById('rmsg');

const RAISE_IDLE=150, RAISE_UP=-70, POP=100;
let phase='start';         // start | shaking | popping | result
let energy=0, motionWorking=false, lastA=null, lastBuzz=0;

function setRaise(px){ strawPos.style.setProperty('--raise', px+'px'); }
setRaise(RAISE_IDLE);

function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

/* ===== 사운드 ===== */
let AC=null;
function initAudio(){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(f,d,type){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.25,AC.currentTime+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+d+0.02);
}

/* ===== 에너지 축적 ===== */
function addEnergy(v){
  if(phase!=='shaking') return;
  energy=Math.min(energy+v, POP);
  meter.style.width=(energy/POP*100)+'%';
  const now=performance.now();
  if(v>7 && now-lastBuzz>80){ buzz(Math.min(30,8+v)); lastBuzz=now; }
  if(energy>=POP) pop();
}
/* 흔들기 상태에서 에너지 서서히 감소(계속 흔들어야 참) */
setInterval(()=>{ if(phase==='shaking' && energy>0){ energy=Math.max(0,energy-2.2); meter.style.width=(energy/POP*100)+'%'; } },100);

/* ===== 모션 센서 ===== */
function onMotion(e){
  const a=e.accelerationIncludingGravity;
  if(!a || (a.x==null && a.y==null)) return;
  if(!motionWorking){ motionWorking=true; sensorEl.classList.add('on'); sensorEl.textContent='센서 작동'; }
  if(lastA){
    const dx=a.x-lastA.x, dy=a.y-lastA.y, dz=(a.z||0)-(lastA.z||0);
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d>2) addEnergy(d*0.9);
  }
  lastA={x:a.x,y:a.y,z:a.z};
}

/* ===== 데스크탑 폴백: 문지르기 ===== */
let lastP=null, lastPT=0;
stage.addEventListener('pointermove', ev=>{
  const t=performance.now();
  if(lastP){
    const dt=Math.max(t-lastPT,8);
    const sp=Math.hypot(ev.clientX-lastP.x, ev.clientY-lastP.y)/dt;
    if(sp>0.4) addEnergy(sp*4);
  }
  lastP={x:ev.clientX,y:ev.clientY}; lastPT=t;
});

/* ===== 팝(빨대 뽑힘) ===== */
function pop(){
  if(phase!=='shaking') return;
  phase='popping';
  stage.classList.remove('shaking');
  const f=FORTUNES[Math.floor(Math.random()*FORTUNES.length)];
  strawTextEl.textContent=f.straw;
  buzz([0,60,40,140]); beep(660,0.12,'sine'); setTimeout(()=>beep(990,0.16,'sine'),140);
  setRaise(RAISE_UP);               // 빨대 쑥 상승
  setTimeout(()=>{
    phase='result';
    stage.classList.add('result');
    rmsg.textContent=f.msg;
    resultCard.style.display='block';
    resultCard.animate([{transform:'translateX(-50%) scale(.6)',opacity:0},{transform:'translateX(-50%) scale(1)',opacity:1}],{duration:420,easing:'cubic-bezier(.18,.9,.3,1.3)'});
    buzz([0,40,30,90]); beep(1175,0.22,'sine');
  },1000);
}

/* ===== 흔들기 상태 진입 ===== */
function enterShaking(){
  phase='shaking'; energy=0; meter.style.width='0%';
  stage.classList.remove('result');
  stage.classList.add('shaking');
  cupWrap.classList.add('shaking');
  resultCard.style.display='none';
  strawTextEl.textContent='';
  setRaise(RAISE_IDLE);
}

/* ===== 시작 ===== */
document.getElementById('startBtn').addEventListener('click', async ()=>{
  if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
    sensorEl.classList.add('show');
    try{
      const p=await DeviceMotionEvent.requestPermission();
      if(p==='granted'){ window.addEventListener('devicemotion',onMotion); }
      else { sensorEl.textContent='버튼/문지르기'; }
    }catch(err){ sensorEl.textContent='센서 차단됨'; }
  }else if(typeof DeviceMotionEvent!=='undefined'){
    window.addEventListener('devicemotion',onMotion);
  }
  initAudio(); buzz(20);
  startCard.style.display='none';
  enterShaking();
  setTimeout(()=>{ if(!motionWorking){ hint.textContent='화면을 빠르게 문질러 보세요!'; } },2000);
});

/* ===== 다시하기 ===== */
document.getElementById('replayBtn').addEventListener('click', ()=>{ enterShaking(); });
</script>
</body>
</html>
