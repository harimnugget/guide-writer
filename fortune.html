<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>오늘의 운세 · 공차</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; background:#e8f1f7; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; overflow:hidden; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 100% at 50% 18%, #cfe6f5 0%, #9cc6e6 60%, #7fb4dd 100%); }
  #c { width:100%; height:100%; display:block; touch-action:none; }

  #sensor { position:absolute; top:max(16px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-size:12px; font-weight:600; color:#5a7184; padding:5px 12px; border-radius:99px;
    background:rgba(255,255,255,.45); border:1px solid rgba(255,255,255,.6); letter-spacing:.3px; }
  #sensor.on { color:#1f9d57; border-color:rgba(31,157,87,.4); background:rgba(255,255,255,.7); }

  #meterWrap { position:absolute; bottom:88px; left:50%; transform:translateX(-50%);
    width:min(70%,360px); height:10px; background:rgba(255,255,255,.45); border-radius:99px; overflow:hidden;
    border:1px solid rgba(255,255,255,.6); }
  #meter { height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,#ffb27a,#f0593f,#d62f28); transition:width .08s linear; }

  #hint { position:absolute; bottom:118px; left:50%; transform:translateX(-50%);
    color:#34495e; font-size:15px; font-weight:700; letter-spacing:.3px; opacity:.92; text-align:center;
    text-shadow:0 1px 2px rgba(255,255,255,.5); }

  #shakeBtn { position:absolute; bottom:max(30px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    padding:14px 40px; font-size:17px; font-weight:700; color:#fff;
    background:linear-gradient(180deg,#ef5a48,#d62f28); border:none; border-radius:99px;
    box-shadow:0 6px 18px rgba(214,47,40,.4); cursor:pointer; }
  #shakeBtn:active { transform:translateX(-50%) scale(.95); }

  #start, #result { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(30,50,70,.55); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); z-index:5; }
  #result { display:none; }
  .card, .rcard { text-align:center; padding:34px 30px; background:rgba(255,255,255,.96);
    border-radius:26px; box-shadow:0 20px 50px rgba(0,0,0,.3); max-width:340px; margin:0 18px; }
  .title { color:#d62f28; font-size:32px; font-weight:800; letter-spacing:1px; }
  .sub { color:#6b7785; font-size:15px; margin-top:10px; }
  #startBtn, #againBtn { margin-top:24px; padding:14px 46px; font-size:18px; font-weight:700;
    color:#fff; background:linear-gradient(180deg,#ef5a48,#d62f28); border:none; border-radius:99px;
    box-shadow:0 6px 20px rgba(214,47,40,.35); cursor:pointer; }
  #startBtn:active,#againBtn:active { transform:scale(.95); }
  .note { color:#9aa4ad; font-size:12px; margin-top:18px; line-height:1.7; }
  .note b { color:#6b7785; }

  .rcard { animation:pop .45s cubic-bezier(.18,.9,.3,1.3); }
  @keyframes pop { 0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1} }
  .rlabel { color:#d62f28; font-size:14px; font-weight:700; letter-spacing:1px; }
  .rtitle { font-size:27px; font-weight:900; margin:10px 0 12px; line-height:1.3; word-break:keep-all; color:#2c3e50; }
  .rmsg { color:#56616b; font-size:16px; line-height:1.65; word-break:keep-all; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="sensor">센서 대기 중</div>
  <div id="meterWrap"><div id="meter"></div></div>
  <div id="hint">📱 컵을 흔드세요!</div>
  <button id="shakeBtn">흔들기</button>

  <div id="start">
    <div class="card">
      <div class="title">오늘의 운세</div>
      <div class="sub">공차 컵을 흔들어 빨대를 뽑아보세요</div>
      <button id="startBtn">시작하기</button>
      <div class="note">아이폰은 누르면 <b>동작·방향 접근</b> 허용 팝업이 떠요. 허용을 눌러주세요.</div>
    </div>
  </div>

  <div id="result">
    <div class="rcard">
      <div class="rlabel">🥤 오늘의 운세</div>
      <div class="rtitle" id="rtitle"></div>
      <div class="rmsg" id="rmsg"></div>
      <button id="againBtn">다시 뽑기</button>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);

const FORTUNES = [
  {t:'좋은 소식이 들려와요', m:'기다리던 연락이나 결과가 오늘 도착할 수 있어요.', c:'#f2a93b'},
  {t:'작은 행운이 따르는 날', m:'평소 안 풀리던 일이 오늘은 술술 풀려요.', c:'#7fd1a8'},
  {t:'지갑이 두둑해질 신호', m:'생각지 못한 곳에서 이득이 생길 수 있어요.', c:'#f2c14e'},
  {t:'사람 복이 좋은 하루', m:'좋은 인연이나 도움 주는 사람을 만나요.', c:'#6db3f2'},
  {t:'쉬어가도 괜찮아요', m:'무리하지 말고 오늘은 컨디션을 챙기세요.', c:'#b7a6d9'},
  {t:'노력이 빛을 보는 날', m:'준비한 만큼 결과가 따라오는 하루예요.', c:'#ef7a6a'},
  {t:'시작하기 좋은 날', m:'미뤄둔 일, 오늘 첫발을 떼보세요.', c:'#5fc0c8'},
  {t:'뜻밖의 즐거움이 와요', m:'소소한 일에서 행복을 느끼는 하루.', c:'#f59abf'},
  {t:'오해가 풀리는 날', m:'짧은 대화 한마디면 충분해요.', c:'#8ec96b'},
  {t:'결정의 타이밍이 좋아요', m:'망설이던 선택, 지금이 적기예요.', c:'#f0883e'},
  {t:'칭찬받을 일이 생겨요', m:'당신의 노력을 누군가 알아봐 줘요.', c:'#f2c14e'},
  {t:'마음이 가벼워지는 날', m:'걱정하던 일이 생각보다 별일 아니에요.', c:'#7fd1a8'},
];

const N = 7;
let straws = [];
let energy = 0;
let tubeTilt = 0, targetTilt = 0;
let phase = 'idle';
let popT = 0, luckyIdx = -1, luckyFortune = null;
let motionWorking = false;
const POP = 100;

let boba = [];
for(let i=0;i<26;i++){
  boba.push({ nx:(Math.random()-0.5)*1.5, ny:Math.pow(Math.random(),0.7), r:0.032+Math.random()*0.018 });
}

function initStraws(){
  straws = [];
  for(let i=0;i<N;i++){
    straws.push({
      slot:(i/(N-1)-0.5), jx:0, jt:0,
      poke: 34 + Math.random()*46, basePoke: 34 + Math.random()*46,
      ph: Math.random()*Math.PI*2,
      ejX:0, ejY:0, ejR:0, alpha:1
    });
  }
}
initStraws();

function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

let lastBuzz=0;
function addEnergy(v){
  if(phase!=='idle') return;
  energy = Math.min(energy + v, POP);
  const now=performance.now();
  if(v>8 && now-lastBuzz>70){ buzz(Math.min(35, 8+v)); lastBuzz=now; }
  if(energy >= POP) startPop();
}

let lastA = null;
const sensorEl = document.getElementById('sensor');
function onMotion(e){
  const a = e.accelerationIncludingGravity;
  if(!a || (a.x==null && a.y==null)) return;
  if(!motionWorking){ motionWorking=true; sensorEl.classList.add('on'); }
  if(lastA){
    const dx=a.x-lastA.x, dy=a.y-lastA.y, dz=(a.z||0)-(lastA.z||0);
    const d = Math.sqrt(dx*dx+dy*dy+dz*dz);
    sensorEl.textContent = '센서 작동 중 · '+d.toFixed(1);
    if(d>2){ addEnergy(d*0.9); }
    targetTilt = Math.max(-0.32, Math.min(0.32, -(a.x||0)*0.05));
  }
  lastA = {x:a.x,y:a.y,z:a.z};
}

let lastP=null, lastPT=0;
cv.addEventListener('pointermove', ev=>{
  const t=performance.now();
  if(lastP){
    const dt=Math.max(t-lastPT,8);
    const sp=Math.hypot(ev.clientX-lastP.x, ev.clientY-lastP.y)/dt;
    if(sp>0.4){ addEnergy(sp*4); targetTilt=Math.max(-0.3,Math.min(0.3,(ev.clientX-W/2)/W*-0.6)); }
  }
  lastP={x:ev.clientX,y:ev.clientY}; lastPT=t;
});

const shakeBtn=document.getElementById('shakeBtn');
shakeBtn.addEventListener('pointerdown',()=>{ addEnergy(26); targetTilt=(Math.random()-0.5)*0.5; });

function startPop(){
  phase='popping'; popT=0;
  luckyIdx = Math.floor(Math.random()*N);
  luckyFortune = FORTUNES[Math.floor(Math.random()*FORTUNES.length)];
  hint.style.opacity=0; shakeBtn.style.opacity=0;
  buzz([0,60,40,140]); beep(660,0.12,'sine');
}

let AC=null;
function initAudio(){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function clack(){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='triangle'; o.frequency.value=180+Math.random()*160;
  g.gain.setValueAtTime(0.0001,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.14,AC.currentTime+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.07);
  o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+0.08);
}
function beep(f,d,type){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.25,AC.currentTime+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+d+0.02);
}

let frame=0;
function draw(){
  frame++;
  ctx.clearRect(0,0,W,H);
  tubeTilt += (targetTilt - tubeTilt)*0.12;
  targetTilt *= 0.92;
  if(phase==='idle'){ energy *= 0.94; }
  meter.style.width = Math.min(100, energy/POP*100)+'%';

  const cx=W/2, cy=H/2+30;
  const cupW=Math.min(W*0.52,250), cupH=Math.min(H*0.46,350);
  const rimY=-cupH*0.16, botY=cupH*0.5;
  const topR=cupW*0.5, botR=cupW*0.31;
  const domeH=cupW*0.30, domeTopY=rimY-domeH;
  const holeR=topR*0.30;
  const shake = phase==='idle' ? energy/POP : 0;

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(tubeTilt);
  if(shake>0.05){ ctx.translate((Math.random()-0.5)*shake*8,(Math.random()-0.5)*shake*5); }

  ctx.save();
  cupBodyPath(rimY, botY, topR, botR);
  ctx.clip();
  const liqTop=rimY+cupH*0.10;
  const lg=ctx.createLinearGradient(0,liqTop,0,botY);
  lg.addColorStop(0,'#e3d2b8'); lg.addColorStop(.5,'#d8c3a0'); lg.addColorStop(1,'#cdb78f');
  ctx.fillStyle=lg;
  ctx.fillRect(-topR,liqTop,topR*2,botY-liqTop);
  const bobaTop=botY-cupH*0.18;
  for(const b of boba){
    const yy=bobaTop+(botY-bobaTop-cupH*0.02)*b.ny;
    const rad=radAt(yy,rimY,botY,topR,botR);
    const xx=b.nx*rad*0.78;
    const br=b.r*cupW;
    ctx.beginPath(); ctx.arc(xx,yy,br,0,Math.PI*2);
    ctx.fillStyle='#221a12'; ctx.fill();
    ctx.beginPath(); ctx.arc(xx-br*0.3,yy-br*0.3,br*0.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fill();
  }
  ctx.restore();

  cupBodyPath(rimY, botY, topR, botR);
  ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.save(); cupBodyPath(rimY, botY, topR, botR); ctx.clip();
  const hg=ctx.createLinearGradient(-topR,0,topR,0);
  hg.addColorStop(0,'rgba(255,255,255,.28)'); hg.addColorStop(.18,'rgba(255,255,255,.05)');
  hg.addColorStop(.85,'rgba(255,255,255,.0)'); hg.addColorStop(1,'rgba(255,255,255,.22)');
  ctx.fillStyle=hg; ctx.fillRect(-topR,rimY,topR*2,botY-rimY);
  ctx.restore();

  const logoY=rimY+cupH*0.28, ls=cupW*0.20;
  ctx.fillStyle='#c0241a';
  roundRect(-ls/2, logoY-ls/2, ls, ls, ls*0.18); ctx.fill();
  ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold '+(ls*0.42)+'px serif';
  ctx.fillText('貢', 0, logoY-ls*0.20);
  ctx.fillText('茶', 0, logoY+ls*0.22);
  ctx.fillStyle='#6b4a35'; ctx.font='600 '+(cupW*0.085)+'px serif';
  ctx.fillText('Gong cha', 0, logoY+ls*0.78);

  ctx.fillStyle='rgba(235,245,250,.55)';
  roundRect(-topR-2, rimY-6, topR*2+4, 14, 6); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
  roundRect(-topR-2, rimY-6, topR*2+4, 14, 6); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-topR, rimY);
  ctx.bezierCurveTo(-topR, domeTopY, topR, domeTopY, topR, rimY);
  ctx.closePath();
  const dg=ctx.createLinearGradient(-topR,domeTopY,topR,rimY);
  dg.addColorStop(0,'rgba(255,255,255,.42)'); dg.addColorStop(.5,'rgba(220,238,248,.22)');
  dg.addColorStop(1,'rgba(255,255,255,.4)');
  ctx.fillStyle=dg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(-topR*0.35, rimY-domeH*0.5, topR*0.12, domeH*0.45, -0.3, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.45)'; ctx.fill();

  ctx.beginPath();
  ctx.ellipse(0, domeTopY+2, holeR, holeR*0.4, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(40,55,65,.45)'; ctx.fill();

  const baseY=domeTopY+2;
  for(let i=0;i<N;i++){
    const s=straws[i];
    if(phase==='idle'){
      const w = shake*14;
      s.jx = Math.sin(frame*0.4 + s.ph)*w + (Math.random()-0.5)*w*0.6;
      s.jt = Math.sin(frame*0.35 + s.ph)*shake*0.22;
      s.poke = s.basePoke + Math.abs(Math.sin(frame*0.3+s.ph))*shake*34;
      if(shake>0.4 && Math.random()<shake*0.22) clack();
    }
    if(i===luckyIdx && phase!=='idle') continue;
    drawStraw(s.slot*holeR*1.5 + s.jx, baseY, s.poke, s.jt, false);
  }

  if(phase==='popping'){
    popT += 1/60;
    const s=straws[luckyIdx];
    const rise=Math.min(popT/0.55,1);
    const ease=1-Math.pow(1-rise,3);
    const poke=s.basePoke+ease*(cupH*1.0);
    if(popT<0.55){
      drawStraw(s.slot*holeR*0.8, baseY, poke, Math.sin(frame*0.5)*0.07, true);
    }else{
      const et=(popT-0.55)/0.6;
      s.ejX=s.slot*holeR*0.8+Math.sin(et*6)*22;
      s.ejY=-cupH*1.0-et*260;
      s.ejR=et*2.2;
      s.alpha=Math.max(0,1-et*1.1);
      ctx.globalAlpha=s.alpha;
      drawFlyStraw(s.ejX, baseY+s.ejY, s.ejR);
      ctx.globalAlpha=1;
      if(et>=1 && phase==='popping'){ phase='done'; showResult(); }
    }
  }

  ctx.restore();
  requestAnimationFrame(draw);
}

function radAt(y,rimY,botY,topR,botR){
  const t=(y-rimY)/(botY-rimY);
  return topR+(botR-topR)*Math.max(0,Math.min(1,t));
}
function cupBodyPath(rimY,botY,topR,botR){
  const r=12;
  ctx.beginPath();
  ctx.moveTo(-topR,rimY);
  ctx.lineTo(topR,rimY);
  ctx.lineTo(botR,botY-r);
  ctx.quadraticCurveTo(botR,botY,botR-r,botY);
  ctx.lineTo(-botR+r,botY);
  ctx.quadraticCurveTo(-botR,botY,-botR,botY-r);
  ctx.closePath();
}

function drawStraw(x, baseY, poke, tilt, lucky){
  ctx.save();
  ctx.translate(x, baseY); ctx.rotate(tilt);
  const sw=14, top=-poke, slant=sw*1.0;
  ctx.beginPath();
  ctx.moveTo(-sw/2, 12);
  ctx.lineTo(-sw/2, top+slant);
  ctx.lineTo(sw/2, top);
  ctx.lineTo(sw/2, 12);
  ctx.closePath();
  const g=ctx.createLinearGradient(-sw/2,0,sw/2,0);
  if(lucky){ g.addColorStop(0,'#ff7d6a'); g.addColorStop(.45,'#f23b2c'); g.addColorStop(1,'#c41d12'); }
  else { g.addColorStop(0,'#f0604e'); g.addColorStop(.45,'#dd2f24'); g.addColorStop(1,'#a81b12'); }
  if(lucky){ ctx.shadowColor='#ff6a55'; ctx.shadowBlur=18; }
  ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath();
  ctx.moveTo(-sw*0.22, 10); ctx.lineTo(-sw*0.22, top+slant*0.9);
  ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(0, top+slant*0.5, sw*0.5, sw*0.22, -0.5, 0, Math.PI*2);
  ctx.fillStyle = lucky ? '#8a1208' : '#6e0f08'; ctx.fill();
  ctx.restore();
}
function drawFlyStraw(x,y,rot){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(rot);
  ctx.shadowColor='#ff6a55'; ctx.shadowBlur=22;
  const sw=15,h=160;
  ctx.beginPath();
  ctx.moveTo(-sw/2, h/2);
  ctx.lineTo(-sw/2, -h/2+sw);
  ctx.lineTo(sw/2, -h/2);
  ctx.lineTo(sw/2, h/2);
  ctx.closePath();
  const g=ctx.createLinearGradient(-sw/2,0,sw/2,0);
  g.addColorStop(0,'#ff7d6a'); g.addColorStop(.45,'#f23b2c'); g.addColorStop(1,'#c41d12');
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-h/2+sw*0.5,sw*0.5,sw*0.22,-0.5,0,Math.PI*2);
  ctx.fillStyle='#8a1208'; ctx.fill();
  ctx.restore();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

const resultEl=document.getElementById('result');
function showResult(){
  buzz([0,40,30,90]); beep(880,0.18,'sine'); setTimeout(()=>beep(1175,0.25,'sine'),120);
  const f=luckyFortune;
  const rt=document.getElementById('rtitle');
  rt.textContent=f.t; rt.style.color=f.c;
  document.getElementById('rmsg').textContent=f.m;
  resultEl.style.display='flex';
}
document.getElementById('againBtn').addEventListener('click',()=>{
  resultEl.style.display='none';
  phase='idle'; energy=0; luckyIdx=-1;
  initStraws();
  hint.style.opacity=.92; shakeBtn.style.opacity=1;
});

const hint=document.getElementById('hint');
const startEl=document.getElementById('start');
document.getElementById('startBtn').addEventListener('click', async ()=>{
  let permTried=false;
  if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
    permTried=true;
    try{
      const p = await DeviceMotionEvent.requestPermission();
      if(p==='granted'){ window.addEventListener('devicemotion',onMotion); }
      else { sensorEl.textContent='센서 권한 거부됨 — 버튼/문지르기 사용'; }
    }catch(err){ sensorEl.textContent='센서 차단됨 — 권한을 다시 시도하세요'; }
  }else if(typeof DeviceMotionEvent!=='undefined'){
    window.addEventListener('devicemotion',onMotion);
  }else{ sensorEl.textContent='이 기기는 모션 미지원 — 버튼/문지르기'; }
  initAudio(); buzz(20);
  startEl.style.display='none'; resize();
  setTimeout(()=>{
    if(!motionWorking){ hint.textContent='화면을 빠르게 문지르거나 버튼을 누르세요'; }
  },1800);
});

resize();
draw();
</script>
</body>
</html>
